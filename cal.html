<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="cal.css">
</head>
<body>
    <div class="calculator">
        
     <input type="text" id="output-screen" placeholder="0">
            <div>
              <button  onclick="Ac()" class="operator">Ac</button>
              <button  onclick="Del()"class="operator">Del</button>
              <button  onclick="display('%')"class="operator">%</button>
              <button onclick="display('/')"class="operator">/</button>
            </div>
            <div>
              <button onclick="display('7')">7</button>
              <button onclick="display('8')">8</button>
              <button onclick="display('9')">9</button>
              <button onclick="display('*')"class="operator" >*</button>
            </div>
            <div>
              <button onclick="display('4')">4</button>
              <button onclick="display('5')">5</button>
              <button onclick="display('6')">6</button>
              <button onclick="display('-')"class="operator">-</button>
            </div>
            <div>
              <button onclick="display('1')">1</button>
              <button onclick="display('2')">2</button>
              <button onclick="display('3')">3</button>
              <button onclick="display('+')"class="operator">+</button> 
            </div>
            <div>
              <button onclick="display('00')">00</button>
              <button onclick="display('0')"> 0</button>
              <button  onclick="display('.')"class="operator">.</button>
              <button onclick="calculate()"class="equalbtn">=</button>  
            </div>   
         </div>
    <script src="sty.js">
      
    </script>


    
</body>
</html>
